installCRDs: true

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::649822034735:role/k8s-platform-dev-cert-manager

nodeSelector:
  node-role: platform

tolerations:
  - key: node-role
    value: platform
    effect: NoSchedule

prometheus:
  enabled: true
  servicemonitor:
    enabled: true

webhook:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

cainjector:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

# Two ClusterIssuers, both DNS-01 via Route 53 using the IRSA role above.
# Start new Ingresses on -staging to avoid burning Let's Encrypt's production
# rate limits while iterating, then switch the Ingress annotation to -prod
# once a cert issues successfully.
extraObjects:
  - |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-staging
    spec:
      acme:
        server: https://acme-staging-v02.api.letsencrypt.org/directory
        email: vaskosmihaylov@gmail.com
        privateKeySecretRef:
          name: letsencrypt-staging-account-key
        solvers:
          - dns01:
              route53:
                region: eu-west-1
                hostedZoneID: Z0987233HJAC4IN8BOMN
  - |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: vaskosmihaylov@gmail.com
        privateKeySecretRef:
          name: letsencrypt-prod-account-key
        solvers:
          - dns01:
              route53:
                region: eu-west-1
                hostedZoneID: Z0987233HJAC4IN8BOMN
