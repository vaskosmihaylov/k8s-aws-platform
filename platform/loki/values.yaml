loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule
  persistence:
    enabled: true
    size: 10Gi

# Zero out simple-scalable-mode replicas; chart's validate.yaml errors if
# both singleBinary and read/write/backend have nonzero replicas.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: false

# Memcached chunk/results caches default to ~9.8Gi memory requests each —
# far too large for this 2-node t3.large/t3.medium demo cluster. Disabled
# per the chart's own "resource-constrained environments" guidance; Loki
# falls back to in-memory caching.
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Not `monitoring.lokiCanary` — that key doesn't exist on this chart and
# silently does nothing. lokiCanary is top-level.
lokiCanary:
  enabled: false

# Chart's validate.yaml fails with "Helm test requires the Loki Canary to be
# enabled" when test.enabled (default true) and lokiCanary.enabled disagree.
# We don't run `helm test` here (ArgoCD doesn't invoke it), so disable it
# rather than re-enabling the canary we just turned off for capacity reasons.
test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
