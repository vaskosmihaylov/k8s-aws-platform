loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule
  persistence:
    enabled: true
    size: 10Gi

# Zero out simple-scalable-mode replicas; chart's validate.yaml errors if
# both singleBinary and read/write/backend have nonzero replicas.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

gateway:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
