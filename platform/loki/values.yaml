loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h

singleBinary:
  replicas: 1
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule
  persistence:
    enabled: true
    size: 10Gi

gateway:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
