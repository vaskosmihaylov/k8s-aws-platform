server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argocd.k8s.gaiaderma.com
    tls:
      - secretName: argocd-server-tls
        hosts:
          - argocd.k8s.gaiaderma.com

  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

controller:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

configs:
  cm:
    # Required for KSOPS: it's a kustomize exec plugin, both flags are needed
    # for the repo-server to invoke it during manifest generation.
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"

repoServer:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule
  # KSOPS plugin for SOPS decryption
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.3.2
      command: ["/bin/sh", "-c"]
      args:
        - echo "Installing KSOPS...";
          mv /usr/local/bin/ksops /custom-tools/;
          mv /usr/local/bin/kustomize /custom-tools/;
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  volumes:
    - name: custom-tools
      emptyDir: {}
  volumeMounts:
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /usr/local/bin/kustomize
      name: custom-tools
      subPath: kustomize
  env:
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: KUSTOMIZE_PLUGIN_HOME
      value: /.config/kustomize/plugin

applicationSet:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

redis:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule
