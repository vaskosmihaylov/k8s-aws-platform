global:
  # argo-cd chart v6+ sets the server host from global.domain. The old
  # server.ingress.hosts/tls list schema (v5) is ignored by v7.3.4, which is why
  # the live ingress fell back to the chart default argocd.example.com.
  domain: argocd.k8s.gaiaderma.com

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    tls: true
    annotations:
      # start on staging to avoid Let's Encrypt prod rate limits; flip to -prod once it issues
      cert-manager.io/cluster-issuer: letsencrypt-staging
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

controller:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

configs:
  params:
    # Run argocd-server in HTTP mode; ingress-nginx terminates TLS with the
    # cert-manager cert. Avoids double-TLS 502s / redirect loops behind nginx.
    server.insecure: true
  cm:
    # Required for KSOPS: it's a kustomize exec plugin, both flags are needed
    # for the repo-server to invoke it during manifest generation.
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"

repoServer:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule
  # KSOPS plugin for SOPS decryption
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.3.2
      command: ["/bin/sh", "-c"]
      args:
        - echo "Installing KSOPS...";
          mv /usr/local/bin/ksops /custom-tools/;
          mv /usr/local/bin/kustomize /custom-tools/;
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  volumes:
    - name: custom-tools
      emptyDir: {}
  volumeMounts:
    - mountPath: /.config/kustomize/plugin/viaduct.ai/v1/ksops/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /usr/local/bin/kustomize
      name: custom-tools
      subPath: kustomize
  env:
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: KUSTOMIZE_PLUGIN_HOME
      value: /.config/kustomize/plugin

applicationSet:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

redis:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

# The redis-secret-init pre-upgrade hook Job is the one piece not covered by the
# per-component blocks above. Without a platform toleration it can't land on the
# tainted platform node, and the full apps node rejects it ("Too many pods"), so
# the hook stays Pending, times out, and aborts the whole helm upgrade.
redisSecretInit:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

# dex and notifications were the last two components without platform placement. On a heavy
# upgrade their pods roll, can't tolerate the platform taint, and land on the full t3.medium
# apps node ("Too many pods") -> stuck Pending -> the Deployment rollout never completes ->
# the helm upgrade hits its wait deadline ("context deadline exceeded"). Same root cause as
# redisSecretInit above; pinning them to the (near-empty) platform node fixes it.
dex:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule

notifications:
  nodeSelector:
    node-role: platform
  tolerations:
    - key: node-role
      value: platform
      effect: NoSchedule
