apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
  # Wave 0: must be Running before ingress-nginx (wave 1), whose LoadBalancer Service
  # this controller provisions.
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://aws.github.io/eks-charts
      chart: aws-load-balancer-controller
      targetRevision: 3.4.0
      helm:
        valueFiles:
          - $values/platform/aws-load-balancer-controller/values.yaml
    - repoURL: https://github.com/vaskosmihaylov/k8s-aws-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  # The chart generates a random self-signed webhook serving cert at template time (Secret
  # aws-load-balancer-tls) and embeds its CA into both webhook configs' caBundle. Helm re-rolls
  # that cert on every reconcile, so without these ignores Argo CD would see perpetual drift and
  # selfHeal would churn the cert/caBundle pair, intermittently breaking the webhook. Same class
  # of issue as the ingress-nginx admission caBundle.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: aws-load-balancer-tls
      namespace: kube-system
      jsonPointers:
        - /data
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: aws-load-balancer-webhook
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: aws-load-balancer-webhook
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
