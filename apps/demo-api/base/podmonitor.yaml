apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: demo-api
  labels:
    app.kubernetes.io/name: demo-api
    # Required for discovery: kube-prometheus-stack's Prometheus CR only
    # watches PodMonitors carrying this label (podMonitorSelector.matchLabels).
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 30s
