name: Validate Manifests

on:
  pull_request:
    paths:
      - 'argocd/**'
      - 'platform/**'
      - 'apps/**'

jobs:
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Lint YAML
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: {max: 200}, document-start: disable}}' \
            argocd/ platform/ apps/

      - name: Validate Kubernetes manifests
        run: |
          find apps/ -name '*.yaml' -not -name 'kustomization.yaml' | \
            xargs kubeconform -strict -kubernetes-version 1.31.0 \
              -ignore-missing-schemas \
              -summary

      - name: Validate ArgoCD Applications
        run: |
          find argocd/ -name '*.yaml' | \
            xargs kubeconform -strict \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas \
              -summary
